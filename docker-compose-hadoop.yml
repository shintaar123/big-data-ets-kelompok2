services:
  namenode:
    image: apache/hadoop:3
    container_name: hadoop-namenode
    hostname: namenode
    user: root
    command: ["sh", "-c", "mkdir -p /hadoop/dfs/name && chmod -R 777 /hadoop/dfs/name && ([ -d /hadoop/dfs/name/current ] || hdfs namenode -format -force -nonInteractive) && hdfs namenode"]
    ports:
      - "9870:9870"
      - "8020:8020"
    environment:
      HADOOP_HOME: /opt/hadoop
      CLUSTER_NAME: gemparadar
    env_file:
      - hadoop.env
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - hadoop_net
 
  datanode:
    image: apache/hadoop:3
    container_name: hadoop-datanode
    hostname: datanode
    user: root
    command: ["sh", "-c", "mkdir -p /hadoop/dfs/data && chmod -R 777 /hadoop/dfs/data && hdfs datanode"]
    ports:
      - "9866:9866"
    environment:
      HADOOP_HOME: /opt/hadoop
    env_file:
      - hadoop.env
    depends_on:
      - namenode
    networks:
      - hadoop_net
 
volumes:
  namenode_data: {}
  datanode_data: {}
 
networks:
  hadoop_net:
    external: true
    name: hadoop_net